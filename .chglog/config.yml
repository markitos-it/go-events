style: github
template: CHANGELOG.tpl.md
info:
  title: CHANGELOG
  repository_url: https://github.com/markitos-it/go-events
options:
  commits:
    filters:
      Type:
        - feat
        - fix
        - perf
        - refactor
        - build
        - chore
  commit_groups:
    title_maps:
      feat: ✨ Features
      fix: 🐛 Bug Fixes
      perf: ⚡ Performance Improvements
      refactor: ♻️ Code Refactoring
      build: 🏗️ Build System
      chore: 🔧 Chores
  header:
    pattern: "^(\\w*)(?:\\(([\\w\\$\\.\\-\\*\\s]*)\\))?\\:\\s(.*)$"
    pattern_maps:
      - Type
      - Scope
      - Subject
  notes:
    keywords:
      - BREAKING CHANGE
      - BREAKING CHANGES
  link_parsers:
    - pattern: "#([0-9]+)"
      href: "{{ .Info.RepositoryURL }}/issues/$1"