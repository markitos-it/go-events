name: Go CI & Security Checks

on:
  push:
    branches: [ main, master, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test-and-security:
    name: Run Tests and AppSec
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        id: setup-go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
          cache: true

      - name: Start Postgres Database
        id: db-start
        run: make db-start

      - name: Wait for Postgres to be healthy
        id: db-healthy
        run: |
          echo "⏳ Waiting for container to report HEALTHY status..."
          until [ "$(docker inspect --format='{{json .State.Health.Status}}' goevents-postgres)" == "\"healthy\"" ]; do
            sleep 1
          done

      - name: Create Database
        id: db-create
        env:
          PGHOST: 127.0.0.1
          PGUSER: admin
          PGPASSWORD: admin
        run: |
          docker exec -i goevents-postgres psql -U admin -d postgres -c "DROP DATABASE IF EXISTS goevents;"
          make db-create

      - name: Tidy Go Modules
        id: tidy
        run: make tidy

      - name: Start API Server & Wait for Port 30000
        id: api-start
        run: |
          make start > api_server.log 2>&1 &
          echo "⏳ Waiting for API..."
          FORKS=0
          until nc -z 127.0.0.1 30000 || [ $FORKS -eq 60 ]; do
            sleep 1
            FORKS=$((FORKS + 1))
          done

      - name: Run Unit Tests
        id: unit-tests
        run: make test

      - name: Install Security Tools
        id: tools-install
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm install -g snyk
          GITLEAKS_VERSION=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" https://api.github.com/repos/gitleaks/gitleaks/releases/latest | grep tag_name | cut -d '"' -f 4 | sed 's/v//')
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar -xz
          sudo cp gitleaks /usr/local/bin/
          GOLANGCI_VERSION=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" https://api.github.com/repos/golangci/golangci-lint/releases/latest | grep tag_name | cut -d '"' -f 4 | sed 's/v//')
          curl -sSfL "https://github.com/golangci/golangci-lint/releases/download/v${GOLANGCI_VERSION}/golangci-lint-${GOLANGCI_VERSION}-linux-amd64.tar.gz" | tar -xz
          sudo cp "golangci-lint-${GOLANGCI_VERSION}-linux-amd64/golangci-lint" /usr/local/bin/

      - name: Run Application Security Tests
        id: appsec
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: make appsec-test

      - name: Generate Beautiful Job Summary
        if: always()
        env:
          IS_RELEASE: ${{ startsWith(github.ref, 'refs/tags/v') }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          status_to_emoji() {
            if [ "$1" == "success" ]; then echo "✅"; elif [ "$1" == "failure" ]; then echo "❌"; else echo "🛑"; fi
          }
          {
            if [ "$IS_RELEASE" == "true" ]; then
              echo "## 🚀 Goevents - Release Deployment: $TAG_NAME"
            else
              echo "## ⚙️ Goevents - CI Pipeline Report"
            fi
            
            {
              echo "## 🚀 Goevents DevSecOps - Execution Report"
              echo "---"
              echo "### 📊 CI Infrastructure Summary"
              echo "| Component | Configuration / Task | Result |"
              echo "| :--- | :--- | :---: |"
              echo "| 🦫 **Core Environment** | Go v1.26.4 (Cache Active) | $(status_to_emoji '${{ steps.setup-go.outcome }}') |"
              echo "| 🐘 **Database Service** | Postgres 17 (Docker Alpine) | $(status_to_emoji '${{ steps.db-healthy.outcome }}') |"
              echo "| 🗄️ **Database Instance** | Create goevents DB | $(status_to_emoji '${{ steps.db-create.outcome }}') |"
              echo "| ⚡ **ORM & Migrations** | Port :30000 dynamically validated | $(status_to_emoji '${{ steps.api-start.outcome }}') |"
              echo "| 🧪 **Unit Testing** | Coverage & test suite execution | $(status_to_emoji '${{ steps.unit-tests.outcome }}') |"
              echo "| 🛠️ **CI Tooling Setup** | Snyk, Gitleaks, and GolangCI provisioned | $(status_to_emoji '${{ steps.tools-install.outcome }}') |"
              echo "| 🛡️ **AppSec Suite** | Vulnerability scanning evaluation | $(status_to_emoji '${{ steps.appsec.outcome }}') |"
            } >> $GITHUB_STEP_SUMMARY


            echo "---"
            echo "### 📊 CI Infrastructure Summary"
            echo "| Component | Result |"
            echo "| :--- | :---: |"
            echo "| 🦫 **Environment** | $(status_to_emoji '${{ steps.setup-go.outcome }}') |"
            echo "| 🛡️ **AppSec Suite** | $(status_to_emoji '${{ steps.appsec.outcome }}') |"
            
            if [ "$IS_RELEASE" == "true" ]; then
              echo ""
              echo "### 📦 Release Metadata"
              echo "- **Version:** $TAG_NAME"
              echo "- **Deployment Trigger:** Automatic via Tag"
            fi
          } >> $GITHUB_STEP_SUMMARY
          echo "$GITHUB_STEP_SUMMARY" > ci-summary.md

      - name: Upload Summary Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-report
          path: ci-summary.md

  create-release:
    name: Create GitHub Release
    needs: test-and-security
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Download Summary Artifact
        uses: actions/download-artifact@v4
        with:
          name: ci-report
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body_path: ci-summary.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}