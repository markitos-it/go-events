name: Go CI & Security Checks

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test-and-security:
    name: Run Tests and AppSec
    runs-on: ubuntu-latest

    steps:
      # 1. Clonar el repositorio
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Configurar Go
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
          cache: true
          
      # 6. Lanzar tests
      - name: Run Unit Tests
        run: make test

      # 7. Tests de seguridad
      - name: Run Application Security Tests
        run: make appsec-test
